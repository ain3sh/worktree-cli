name: Build and Release

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.0.0). Leave empty to use upstream version.'
        required: false
        type: string
      create_release:
        description: 'Create GitHub release'
        required: false
        type: boolean
        default: true

  # Tag-based trigger
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Standalone Executable
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone git-worktree-runner source
        run: |
          git clone --depth 1 https://github.com/coderabbitai/git-worktree-runner.git /tmp/gtr-source

      - name: Build standalone executable
        run: |
          chmod +x .github/scripts/build-standalone.sh
          .github/scripts/build-standalone.sh --source-dir /tmp/gtr-source --output ./git-gtr

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
          else
            VERSION=$(./git-gtr --version | awk '{print $4}')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Test executable
        run: |
          echo "Testing basic commands..."
          ./git-gtr --version
          ./git-gtr help | head -20
          ./git-gtr adapter
          echo "All tests passed!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-gtr-standalone
          path: |
            git-gtr
            scripts/install.sh
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release)

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: git-gtr-standalone
          path: ./release

      - name: Prepare release assets
        run: |
          cd release
          chmod +x git-gtr scripts/install.sh

          # Create tarball
          tar -czf git-gtr-v${{ needs.build.outputs.version }}.tar.gz git-gtr scripts/

          # Create checksums
          sha256sum git-gtr > git-gtr.sha256
          sha256sum git-gtr-v${{ needs.build.outputs.version }}.tar.gz >> git-gtr.sha256

          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: git-gtr v${{ needs.build.outputs.version }}
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', needs.build.outputs.version) }}
          generate_release_notes: true
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          files: |
            release/git-gtr
            release/scripts/install.sh
            release/git-gtr-v${{ needs.build.outputs.version }}.tar.gz
            release/git-gtr.sha256
          body: |
            ## git-gtr Standalone v${{ needs.build.outputs.version }}

            A single-file standalone distribution of [git-worktree-runner](https://github.com/coderabbitai/git-worktree-runner).

            ### Installation

            **Quick install (recommended):**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ needs.build.outputs.version }}/install.sh | bash
            ```

            **Manual install:**
            ```bash
            # Download the executable
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ needs.build.outputs.version }}/git-gtr -o ~/.local/bin/git-gtr
            chmod +x ~/.local/bin/git-gtr

            # Verify installation
            git gtr --version
            ```

            ### Requirements
            - Bash 3.2+
            - Git 2.5+

            ### Checksums
            ```
            $(cat release/git-gtr.sha256)
            ```
